<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>РАНГО ЦЕНТР</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/fonts.css">

    <link rel="stylesheet" href="styles/title.css">
    <link rel="stylesheet" href="styles/banner.css">
    <link rel="stylesheet" href="styles/piano.css">
</head>
<body>
    <div class="wrapper">
        <div class="title">
            <div class="slider">
                <p class="slider-title">ИНТЕРАКТИВНЫЕ СЕРВИСЫ</p>
                <p class="slider-description">ИНТЕРАКТИВНЫЕ СЕРВИСЫ ИНТЕРАКТИВНЫЕ СЕРВИСЫ</p>
            </div>
            <h1>РАНГО</h1>
        </div>

        <div class="banner">
            <div class="banner-content">
                <h1 class="banner-title">НАСТРОЙ СЕБЯ САМ</h1>
                <button class="banner-button">ВВЕДИТЕ СВОЙ РАНГО-АЙДИ</button>
            </div>
            <div class="glasses-rotator-block">
                <div class="glasses-rotator-wrapper">
                    <div class="glasses-rotator">
                        <img class="glasses-rotator-svg" src="assets/svg/rotator.svg" alt="glasses-rotator-svg"/>
                    </div>
                    <p id="glasses-rotator-value">0%</p>
                </div>
                <p class="glasses-rotator-title">ОЧКИ</p>
            </div>
        </div>

        <div class="piano">
            <div class="piano-display piano-cell">
                <p class="piano-display-value">&nbsp;</p>
            </div>
            <div class="piano-keys">
                <div class="piano-primary-keys">
                    <div class="piano-cell piano-key white-key" data-note="1">
                        1
                        <div class="piano-key black-key-wrapper" data-note="Р">Р</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="2">
                        2
                        <div class="piano-key black-key-wrapper" data-note="А">А</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="3">3</div>
                    <div class="piano-cell piano-key white-key" data-note="4">
                        4
                        <div class="piano-key black-key-wrapper" data-note="Н">Н</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="5">
                        5
                        <div class="piano-key black-key-wrapper" data-note="Г">Г</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="6">
                        6
                        <div class="piano-key black-key-wrapper" data-note="О">О</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="7">7</div>
                    <div class="piano-cell piano-key white-key" data-note="8">
                        8
                        <div class="piano-key black-key-wrapper" data-note="Б">Б</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="9">
                        9
                        <div class="piano-key black-key-wrapper" data-note="В">В</div>
                    </div>
                    <div class="piano-cell piano-key white-key" data-note="0">0</div>
                    <div class="piano-cell piano-key white-key" data-note="-">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="glasses-overlay"></div>

    <script src="js/glasses-rotator.js"></script>
    <script src="js/piano.js"></script>
</body>
</html>
